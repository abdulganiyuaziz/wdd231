<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Accra Chamber of Commerce Home Page" />
    <title>Accra Chamber of Commerce</title>

    <link rel="stylesheet" href="styles/chamber.css" />
    <script defer src="scripts/home.js"></script>
  </head>

  <body>
    <header>
      <h1>Accra Chamber of Commerce</h1>
    </header>

    <nav>
      <ul>
        <li><a href="index.html" class="active">Home</a></li>
        <li><a href="directory.html">Directory</a></li>
        <li><a href="#">Join</a></li>
      </ul>
    </nav>

    <main>
      <!-- HERO -->
      <section class="hero">
        <img src="images/logo.jfif" alt="Accra City" />
        <div class="hero-text">
          <h2>Grow Your Business with Us</h2>
          <a href="#" class="cta">Join the Chamber</a>
        </div>
      </section>

      <!-- EVENTS -->
      <section class="events">
        <h2>Current Events</h2>
        <ul>
          <li>📅 March 25: Business Networking Meetup</li>
          <li>📅 April 2: Small Business Workshop</li>
        </ul>
      </section>

      <!-- WEATHER -->
      <section class="weather">
        <h2>Weather in Accra</h2>
        <p id="temp"></p>
        <p id="desc"></p>
        <div id="forecast"></div>
      </section>

      <!-- SPOTLIGHT -->
      <section class="spotlights">
        <h2>Company Spotlights</h2>
        <div id="spotlight-container"></div>
      </section>
    </main>

    <footer>
      <p>&copy; 2026 Accra Chamber | All Rights Reserved</p>
    </footer>
  </body>
</html>
