<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Discover - Accra Chamber of Commerce</title>

<meta name="description" content="Discover attractions and places of interest in Accra, Ghana. Explore the cultural, historical, and recreational highlights that make Accra a vibrant destination.">
<meta name="author" content="Abdul Ganiyu Abdul Aziz">
<meta name="keywords" content="Accra attractions, places of interest, tourism, cultural sites, beaches, museums, Ghana">
<meta name="theme-color" content="#003366">

<link rel="icon" href="../images/favicon.jfif" type="image/x-icon">
<link rel="canonical" href="https://abdulganiyuaziz.github.io/wdd231/chamber/discover.html">

<meta property="og:type" content="website">
<meta property="og:title" content="Discover Accra - Places of Interest">
<meta property="og:description" content="Explore attractions and cultural sites in Accra, Ghana">
<meta property="og:image" content="../images/logo.jfif">
<meta property="og:url" content="https://abdulganiyuaziz.github.io/wdd231/chamber/discover.html">

<link rel="stylesheet" href="../css/normalize.css">
<link rel="stylesheet" href="../css/small.css">
<link rel="stylesheet" href="../css/larger.css">

<style>
  /* Discover Page Specific Styles */
  
  .discover-main {
    width: 100%;
  }

  /* Visit Message Styles */
  .visit-message {
    background: linear-gradient(135deg, #e8f4f8 0%, #fff5e6 100%);
    border-left: 4px solid #003366;
    padding: 1.5rem;
    margin-bottom: 2rem;
    border-radius: 4px;
    box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
  }

  .visit-message p {
    margin: 0;
    color: #333;
    font-weight: 500;
  }

  .visit-message.info {
    border-left-color: #003366;
  }

  .visit-message.success {
    border-left-color: #28a745;
    background: linear-gradient(135deg, #e8f5e9 0%, #f1f8e9 100%);
  }

  /* Discover Page Title */
  .discover-header {
    text-align: center;
    padding: 2rem 1rem;
    background: linear-gradient(135deg, #003366 0%, #004d99 100%);
    color: white;
    margin-bottom: 2rem;
  }

  .discover-header h1 {
    margin: 0;
    font-size: 2rem;
    font-weight: bold;
  }

  .discover-header p {
    margin: 0.5rem 0 0 0;
    opacity: 0.95;
    font-size: 1.1rem;
  }

  /* Gallery Grid - Responsive Layouts */
  .discover-gallery {
    display: grid;
    gap: 1.5rem;
    padding: 0 1rem;
    margin-bottom: 2rem;
  }

  /* Small Screen Layout (320px - 640px) */
  @media (max-width: 640px) {
    .discover-gallery {
      grid-template-columns: 1fr;
      grid-template-areas:
        "card1"
        "card2"
        "card3"
        "card4"
        "card5"
        "card6"
        "card7"
        "card8";
    }

    .discover-card:nth-child(1) { grid-area: card1; }
    .discover-card:nth-child(2) { grid-area: card2; }
    .discover-card:nth-child(3) { grid-area: card3; }
    .discover-card:nth-child(4) { grid-area: card4; }
    .discover-card:nth-child(5) { grid-area: card5; }
    .discover-card:nth-child(6) { grid-area: card6; }
    .discover-card:nth-child(7) { grid-area: card7; }
    .discover-card:nth-child(8) { grid-area: card8; }
  }

  /* Medium Screen Layout (641px - 1024px) */
  @media (min-width: 641px) and (max-width: 1024px) {
    .discover-gallery {
      grid-template-columns: 1fr 1fr;
      grid-template-areas:
        "card1 card2"
        "card3 card4"
        "card5 card6"
        "card7 card8";
    }

    .discover-card:nth-child(1) { grid-area: card1; }
    .discover-card:nth-child(2) { grid-area: card2; }
    .discover-card:nth-child(3) { grid-area: card3; }
    .discover-card:nth-child(4) { grid-area: card4; }
    .discover-card:nth-child(5) { grid-area: card5; }
    .discover-card:nth-child(6) { grid-area: card6; }
    .discover-card:nth-child(7) { grid-area: card7; }
    .discover-card:nth-child(8) { grid-area: card8; }
  }

  /* Large Screen Layout (1025px+) */
  @media (min-width: 1025px) {
    .discover-gallery {
      grid-template-columns: 1fr 1fr 1fr 1fr;
      grid-template-areas:
        "card1 card2 card3 card4"
        "card5 card6 card7 card8";
      max-width: 1400px;
      margin-left: auto;
      margin-right: auto;
    }

    .discover-card:nth-child(1) { grid-area: card1; }
    .discover-card:nth-child(2) { grid-area: card2; }
    .discover-card:nth-child(3) { grid-area: card3; }
    .discover-card:nth-child(4) { grid-area: card4; }
    .discover-card:nth-child(5) { grid-area: card5; }
    .discover-card:nth-child(6) { grid-area: card6; }
    .discover-card:nth-child(7) { grid-area: card7; }
    .discover-card:nth-child(8) { grid-area: card8; }
  }

  /* Individual Card Styles */
  .discover-card {
    background: white;
    border-radius: 8px;
    overflow: hidden;
    box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
    transition: transform 0.3s ease, box-shadow 0.3s ease;
    display: flex;
    flex-direction: column;
    height: 100%;
  }

  .discover-card:hover {
    transform: translateY(-4px);
    box-shadow: 0 6px 16px rgba(0, 0, 0, 0.15);
  }

  .discover-card figure {
    margin: 0;
    overflow: hidden;
    flex-shrink: 0;
    height: 250px;
  }

  .discover-card img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: block;
  }

  /* Hover effect on images (desktop/tablet only) */
  @media (min-width: 641px) {
    .discover-card:hover img {
      filter: brightness(1.1) contrast(1.05);
      transform: scale(1.05);
      transition: filter 0.3s ease, transform 0.3s ease;
    }
  }

  .discover-card h2 {
    color: #003366;
    font-size: 1.4rem;
    margin: 1rem;
    margin-bottom: 0.5rem;
  }

  .discover-card address {
    font-style: normal;
    color: #666;
    padding: 0 1rem;
    font-size: 0.95rem;
    font-weight: 500;
  }

  .discover-card p {
    flex-grow: 1;
    padding: 0 1rem;
    margin: 0.5rem 0;
    color: #555;
    font-size: 0.95rem;
    line-height: 1.6;
  }

  .discover-card button {
    background-color: #003366;
    color: white;
    border: none;
    padding: 0.75rem 1.5rem;
    margin: 1rem;
    border-radius: 4px;
    font-size: 1rem;
    cursor: pointer;
    transition: background-color 0.3s ease;
    font-weight: 600;
    align-self: flex-start;
  }

  .discover-card button:hover {
    background-color: #004d99;
  }

  .discover-card button:active {
    background-color: #003355;
  }

  /* Loading State */
  .discover-loading {
    text-align: center;
    padding: 3rem 1rem;
    color: #666;
    font-size: 1.1rem;
  }

  .discover-error {
    background-color: #ffe6e6;
    border-left: 4px solid #d32f2f;
    padding: 1.5rem;
    margin: 2rem 1rem;
    border-radius: 4px;
    color: #b71c1c;
    font-weight: 500;
  }
</style>

</head>

<body>

<main id="main-content" class="discover-main">

  <!-- Visit Message Section -->
  <div id="visit-message" class="visit-message" role="status" aria-live="polite">
    <p>Loading visit information...</p>
  </div>

  <!-- Discover Header -->
  <section class="discover-header" role="region" aria-label="Discover page introduction">
    <h1>Discover Accra</h1>
    <p>Explore the cultural, historical, and recreational highlights that make Accra a vibrant destination</p>
  </section>

  <!-- Main Content Container -->
  <div class="main-container">
    
    <!-- Places of Interest Gallery -->
    <section role="region" aria-label="Places of interest gallery">
      <div id="discover-gallery" class="discover-gallery">
        <div class="discover-loading">Loading places of interest...</div>
      </div>
    </section>

  </div>

</main>

<script type="module" src="discover.js" defer></script>
<script src="../js/utils.js" defer></script>

</body>
</html>
