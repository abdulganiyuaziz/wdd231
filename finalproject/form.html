<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Contact form - Get in touch with Abdul Ganiyu Abdul Aziz about collaboration opportunities.">
    <meta name="author" content="Abdul Ganiyu Abdul Aziz">
    <meta property="og:title" content="Contact - Developer Portfolio">
    <meta property="og:description" content="Send me a message.">
    <meta property="og:type" content="website">
    <title>Contact - Developer Portfolio</title>
    <link rel="icon" href="favicon.ico" type="image/x-icon">
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <header>
        <nav class="navbar">
            <div class="logo">Dev Portfolio</div>
            <button class="hamburger" id="hamburger">☰</button>
            <ul class="nav-menu" id="navMenu">
                <li><a href="index.html" class="nav-link">Home</a></li>
                <li><a href="about.html" class="nav-link">About</a></li>
                <li><a href="projects.html" class="nav-link">Projects</a></li>
                <li><a href="form.html" class="nav-link active">Contact</a></li>
            </ul>
        </nav>
    </header>

    <main>
        <section class="contact-section">
            <h1>Get In Touch</h1>
            <p>Send us a message and we'll get back to you as soon as possible.</p>
            <form id="contactForm" class="contact-form">
                <div class="form-group">
                    <label for="name">Name:</label>
                    <input type="text" id="name" name="name" required aria-required="true">
                </div>
                <div class="form-group">
                    <label for="email">Email:</label>
                    <input type="email" id="email" name="email" required aria-required="true">
                </div>
                <div class="form-group">
                    <label for="subject">Subject:</label>
                    <input type="text" id="subject" name="subject" required aria-required="true">
                </div>
                <div class="form-group">
                    <label for="message">Message:</label>
                    <textarea id="message" name="message" rows="5" required aria-required="true"></textarea>
                </div>
                <button type="submit" class="submit-btn">Send Message</button>
            </form>
        </section>
    </main>

    <footer>
        <p>&copy; 2026 Developer Portfolio</p>
        <p><a href="attributions.html">Attributions</a> | <a href="https://your-video-link.com" target="_blank">Video Demo</a></p>
    </footer>

    <script type="module" src="js/main.js"></script>
</body>
</html>
